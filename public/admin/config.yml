backend:
  name: github
  repo: aldnlee/lifeatpih
  branch: main
  base_url: https://lifeatpih.denleerider354.workers.dev
  auth_endpoint: /auth

# Pengaturan Media
media_folder: "public/images/uploads" 
public_folder: "/images/uploads"      

collections:
  - name: "teams"
    label: "PIH Teams"
    folder: "src/content/teams"
    create: true
    extension: "yaml" # Konsisten menggunakan YAML
    format: "yaml"
    fields:
      - { label: "Batch Name", name: "title", widget: "string", hint: "Contoh: Gen 9" }
      - label: "Roles"
        name: "roles"
        widget: "list"
        fields:
          - { label: "Role Name", name: "role_name", widget: "string" }
          - label: "Photos"
            name: "photos"
            widget: "list"
            field: { label: "Image", name: "url", widget: "image" }

  - name: "internal_docs"
    label: "Dokumen Internal"
    folder: "src/pages/internal"
    create: true
    extension: "md" # Dokumentasi wajib Markdown
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "vacancies"
    label: "Lowongan Magang"
    folder: "src/content/vacancies"
    create: true
    slug: "{{slug}}"
    extension: "yaml" # Data terstruktur wajib YAML
    format: "yaml"
    fields:
      - { label: "Nama Batch", name: "batch_name", widget: "string", hint: "Contoh: Batch 9" }
      - { label: "Status Pendaftaran", name: "status", widget: "select", options: ["Open", "Closed"], default: "Open" }
      - label: "Daftar Role Tersedia"
        name: "roles"
        widget: "list"
        summary: "{{fields.role_title}}"
        fields:
          - { label: "Nama Role/Posisi", name: "role_title", widget: "string" }
          - { label: "Deskripsi Singkat", name: "description", widget: "text", required: false }
      - { label: "Konten Pengumuman", name: "body", widget: "markdown" }