backend:
  name: github
  repo: aldnlee/lifeatpih
  branch: main
  base_url: https://lifeatpih.denleerider354.workers.dev
  auth_endpoint: /auth
  # JANGAN masukkan site_id: demo.decapcms.org di sini

# --- TAMBAHKAN INI ---
# Pengaturan Penyimpanan Lokal
media_folder: "public/images/uploads" # Folder fisik di GitHub
public_folder: "/images/uploads"      # Jalur akses di website

collections:
  - name: "teams"
    label: "PIH Teams"
    folder: "src/content/teams"
    create: true
    format: "json"
    fields:
      - { label: "Batch Name", name: "title", widget: "string" }
      - label: "Roles"
        name: "roles"
        widget: "list"
        fields:
          - { label: "Role Name", name: "role_name", widget: "string" }
          - label: "Photos"
            name: "photos"
            widget: "list"
            # allow_multiple memungkigitnkan kamu pilih banyak foto sekaligus
            field: 
              label: "Image"
              name: "url"
              widget: "image"
              allow_multiple: true

  - name: "internal_docs"
    label: "Dokumen Internal"
    folder: "src/pages/internal" # Mengarah ke folder rahasia tadi
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "vacancies"
    label: "Lowongan Magang"
    folder: "src/content/vacancies"
    create: true
    slug: "{{slug}}"
    format: "yaml" # Menggunakan format YAML agar lebih mudah dibaca
    fields:
      - { label: "Nama Batch", name: "batch_name", widget: "string", hint: "Contoh: Magang PIH Batch 9" }
      - { label: "Status Pendaftaran", name: "status", widget: "select", options: ["Open", "Closed"], default: "Open" }
      
      # --- BAGIAN LIST ROLE ---
      - label: "Daftar Role Tersedia"
        name: "roles"
        widget: "list"
        summary: "{{fields.role_title}}" # Menampilkan nama role di ringkasan list
        fields:
          - { label: "Nama Role/Posisi", name: "role_title", widget: "string", hint: "Contoh: Graphic Designer" }
          - { label: "Deskripsi Singkat (Opsional)", name: "description", widget: "text", required: false }
      
      - { label: "Konten Pengumuman", name: "body", widget: "markdown", hint: "Tulis detail persyaratan umum di sini" }