backend:
  name: github
  repo: aldnlee/lifeatpih
  branch: main
  base_url: https://lifeatpih.denleerider354.workers.dev
  auth_endpoint: /auth

# Pengaturan Media
media_folder: "public/images/uploads" 
public_folder: "/images/uploads"      

collections:
  - name: "teams"
    label: "PIH Teams"
    folder: "src/content/teams"
    create: true
    extension: "yaml"
    format: "yaml"
    fields:
      - { label: "Batch Name", name: "title", widget: "string", hint: "Contoh: Gen 9" }
      - label: "Roles"
        name: "roles"
        widget: "list"
        fields:
          - { label: "Role Name", name: "role_name", widget: "string" }
          - label: "Photos"
            name: "photos"
            widget: "list"
            field: { label: "Image", name: "url", widget: "image" }

  - name: "internal_docs"
    label: "Dokumen Internal"
    folder: "src/pages/internal"
    create: true
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "vacancies"
    label: "Lowongan Magang"
    folder: "src/content/vacancies"
    create: true
    slug: "{{batch_id}}"
    extension: "yaml"
    format: "yaml"
    fields:
      - { label: "ID Batch (Unik)", name: "batch_id", widget: "string", hint: "Gunakan kode unik tanpa spasi, misal: Batch-10. JANGAN diubah jika sudah ada pelamar." }
      - { label: "Nama Batch", name: "batch_name", widget: "string", hint: "Contoh: Mahardika Internship Batch 10" }
      - { label: "Status Pendaftaran", name: "status", widget: "select", options: ["Open", "Closed"], default: "Open" }
      
      # --- TIMELINE EKSPLISIT BERDASARKAN BANNER REKRUTMEN ---
      - label: "Detail Timeline Seleksi"
        name: "timeline_details"
        widget: "object"
        fields:
          - { label: "Tanggal Registrasi", name: "registrasi", widget: "string", default: "22-28 JUL 2026 (17.00 WIB)", hint: "Contoh: 22-28 JUL 2026 17.00 WIB" }
          - { label: "Pengumuman Seleksi Administratif", name: "pengumuman_admin", widget: "string", default: "29 JUL 2026 (20.00 WIB)", hint: "Contoh: 29 JUL 2026 20.00 WIB" }
          - { label: "Tanggal Wawancara", name: "wawancara", widget: "string", default: "3-4 AGU 2026", hint: "Contoh: 3-4 AGU 2026" }
          - { label: "Pengumuman Akhir", name: "pengumuman_akhir", widget: "string", default: "5 AGU 2026", hint: "Contoh: 5 AGU 2026" }
          - { label: "Tanggal Onboarding", name: "onboarding", widget: "string", default: "10 AGU 2026", hint: "Contoh: 10 AGU 2026" }
          
      - label: "Daftar Role Tersedia"
        name: "roles"
        widget: "list"
        summary: "{{fields.role_title}}"
        fields:
          - { label: "Nama Role/Posisi", name: "role_title", widget: "string" }
          - { label: "Deskripsi Singkat", name: "description", widget: "text", required: false }
      - { label: "Konten Pengumuman", name: "body", widget: "markdown" }

  - name: "role_details"
    label: "Detail Role/Posisi"
    folder: "src/content/roles"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Nama Role", name: "title", widget: "string" }
      - { label: "Kategori", name: "category", widget: "string", hint: "Contoh: Creative, Production" }
      - { label: "Icon Emoji", name: "icon", widget: "string" }
      - { label: "Tanggung Jawab", name: "body", widget: "markdown" }