<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager | Life at PIH</title>
    <script>window.__REACT_DEVTOOLS_GLOBAL_HOOK__ = { isDisabled: true };</script>
  </head>
  <body>
    <div id="nc-root"></div>

    <script src="https://unpkg.com/netlify-cms-media-library-cloudinary@1.3.10/dist/netlify-cms-media-library-cloudinary.js"></script>

    <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>

    <script>
      // Fungsi untuk memastikan Cloudinary terdaftar tanpa menyebabkan error "already registered"
      (function() {
        const registerCloudinary = () => {
          if (window.CMS && window.NetlifyCmsMediaLibraryCloudinary) {
            try {
              CMS.registerMediaLibrary(window.NetlifyCmsMediaLibraryCloudinary);
              console.log("Cloudinary Media Library successfully verified/registered.");
            } catch (e) {
              console.log("Cloudinary already registered by Decap, continuing...");
            }
          } else {
            setTimeout(registerCloudinary, 50);
          }
        };
        registerCloudinary();
      })();

      // Deteksi error pop-up untuk membantu troubleshooting user
      window.onerror = function(msg) {
        if (msg.toLowerCase().includes('popup')) {
          alert("PERHATIAN: Browser memblokir Pop-up. Harap izinkan pop-up agar jendela Cloudinary bisa terbuka.");
        }
      };
    </script>
  </body>
</html>
